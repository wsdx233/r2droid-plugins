<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Il2Cpp to R2 Script</title>
  <style>
    /* Material Design 3 Dark Theme Tokens */
    :root {
      color-scheme: dark;
      --md-sys-color-background: #111318;
      --md-sys-color-surface: #1e2026;
      --md-sys-color-surface-container: #292d36;
      --md-sys-color-surface-container-high: #343843;
      --md-sys-color-primary: #a8c7fa;
      --md-sys-color-on-primary: #062e6f;
      --md-sys-color-secondary-container: #44474e;
      --md-sys-color-on-secondary-container: #e2e2e9;
      --md-sys-color-error: #ffb4ab;
      --md-sys-color-on-error: #690005;
      --md-sys-color-success: #81c995;
      --md-sys-color-on-success: #00391b;
      --md-sys-color-on-surface: #e2e2e9;
      --md-sys-color-on-surface-variant: #c4c6d0;
      --md-sys-color-outline: #8e9199;

      --font-family: "Google Sans", "Segoe UI", Roboto, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Consolas, monospace;

      --spring: cubic-bezier(0.2, 0.8, 0.2, 1.2);
      --ease-out: cubic-bezier(0.0, 0.0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-family);
      color: var(--md-sys-color-on-surface);
      background-color: var(--md-sys-color-background);
      padding: 24px 16px;
      display: flex;
      justify-content: center;
    }

    .wrap {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: slideUpFade 0.6s var(--ease-out) forwards;
    }

    @keyframes slideUpFade {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: var(--md-sys-color-surface);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .header-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .lang-wrap {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .lang-label {
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .lang-select {
      min-height: 34px;
      border-radius: 10px;
      border: 1px solid var(--md-sys-color-outline);
      background: var(--md-sys-color-surface-container);
      color: var(--md-sys-color-on-surface);
      padding: 0 10px;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 600;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      font-weight: 500;
      color: var(--md-sys-color-primary);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--md-sys-color-surface-container);
      font-size: 14px;
      font-weight: 500;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--md-sys-color-outline);
      transition: all 0.4s var(--spring);
    }

    .status-pill:has(.dot.running) {
      background: rgba(129, 201, 149, 0.1);
      color: var(--md-sys-color-success);
    }

    .dot.running {
      background: var(--md-sys-color-success);
      box-shadow: 0 0 0 0 rgba(129, 201, 149, 0.4);
      animation: ripple 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes ripple {
      0% {
        box-shadow: 0 0 0 0 rgba(129, 201, 149, 0.4);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(129, 201, 149, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(129, 201, 149, 0);
      }
    }

    /* 表单输入区域 */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: var(--md-sys-color-on-surface-variant);
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      background: var(--md-sys-color-surface-container);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 12px;
      color: var(--md-sys-color-on-surface);
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: var(--md-sys-color-primary);
    }

    .input-with-btn {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-with-btn input[type="text"] {
      flex: 1;
      min-width: 0;
    }

    .ghost-btn {
      min-height: 42px;
      border-radius: 12px;
      border: 1px solid var(--md-sys-color-outline);
      background: var(--md-sys-color-surface-container-high);
      color: var(--md-sys-color-on-surface);
      padding: 0 14px;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }

    .hint {
      margin-top: 6px;
      font-size: 12px;
      color: var(--md-sys-color-on-surface-variant);
      opacity: 0.9;
    }

    /* 复选框网格 */
    .checkbox-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      cursor: pointer;
    }

    .checkbox-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--md-sys-color-primary);
      cursor: pointer;
    }

    /* 按钮组 */
    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      border: none;
      border-radius: 999px;
      min-height: 48px;
      padding: 0 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s var(--spring);
    }

    button:active {
      transform: scale(0.96);
      filter: brightness(0.9);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button.primary {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    /* 终端控制台 */
    .console-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
      color: var(--md-sys-color-on-surface-variant);
    }

    .console-header .tag {
      font-size: 12px;
      background: var(--md-sys-color-surface-container-high);
      padding: 4px 10px;
      border-radius: 8px;
      color: var(--md-sys-color-primary);
    }

    pre {
      margin: 0;
      background: #0d0f14;
      border-radius: 16px;
      padding: 16px;
      min-height: 200px;
      max-height: 40vh;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.6;
      color: var(--md-sys-color-on-surface-variant);
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    pre::-webkit-scrollbar {
      width: 6px;
    }

    pre::-webkit-scrollbar-thumb {
      background: var(--md-sys-color-surface-container-high);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <section class="card">
      <div class="header-area">
        <h1 data-i18n="title.main">Il2Cpp R2 Script Generator</h1>
        <div class="header-right">
          <div class="status-pill">
            <span id="dot" class="dot"></span>
            <span id="statusText" data-i18n="status.waiting_input">等待输入</span>
          </div>
          <div class="lang-wrap">
            <label class="lang-label" for="langSelect" data-i18n="label.language">语言</label>
            <select id="langSelect" class="lang-select" onchange="onLanguageChange(this.value)">
              <option value="zh">中文</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 data-i18n="section.paths">1. 文件路径配置</h2>
      <div class="form-group">
        <label data-i18n="label.so_path">外部 SO 文件绝对路径 (libil2cpp.so)</label>
        <div class="input-with-btn">
          <input type="text" id="soPath" placeholder="/sdcard/Download/libil2cpp.so" />
          <button type="button" class="ghost-btn" onclick="pickInputFile('soPath')" data-i18n="btn.open_file">打开文件</button>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="label.meta_path">Global-Metadata 文件绝对路径 (global-metadata.dat)</label>
        <div class="input-with-btn">
          <input type="text" id="metaPath" placeholder="/sdcard/Download/global-metadata.dat" />
          <button type="button" class="ghost-btn" onclick="pickInputFile('metaPath')" data-i18n="btn.open_file">打开文件</button>
        </div>
      </div>
      <div class="form-group">
        <label data-i18n="label.output_path">输出脚本路径</label>
        <div class="input-with-btn">
          <input type="text" id="outputPath" placeholder="/data/user/0/xxx/result/result.r2" />
          <button type="button" class="ghost-btn" onclick="pickOutputDirectory()" data-i18n="btn.choose_folder">选择文件夹</button>
        </div>
        <div class="hint" data-i18n="hint.output_folder">选择文件夹后会自动追加默认文件名 result.r2，支持手动修改文件名。</div>
      </div>

      <h2 style="margin-top: 24px;" data-i18n="section.options">2. 提取脚本选项 (R2 Flags & Comments)</h2>
      <div class="checkbox-grid">
        <label class="checkbox-item"><input type="checkbox" id="chk_ScriptMethod" checked> ScriptMethod</label>
        <label class="checkbox-item"><input type="checkbox" id="chk_ScriptString" checked> ScriptString</label>
        <label class="checkbox-item"><input type="checkbox" id="chk_ScriptMetadata" checked> ScriptMetadata</label>
        <label class="checkbox-item"><input type="checkbox" id="chk_ScriptMetadataMethod" checked>
          MetadataMethod</label>
        <label class="checkbox-item"><input type="checkbox" id="chk_Addresses" checked> Addresses</label>
      </div>

      <div class="actions">
        <button class="primary" id="btnRun" onclick="startConversion()" data-i18n="btn.run">执行提取与转换</button>
      </div>
    </section>

    <section class="card">
      <div class="console-header">
        <span data-i18n="console.logs">执行日志 (Logs)</span>
        <span class="tag" id="lastAction" data-i18n="tag.ready" data-pristine-action="1">Ready</span>
      </div>
      <pre id="out" data-i18n="out.ready_convert" data-pristine="1">Ready to convert...</pre>
    </section>
  </div>

  <script>

    let checkInterval = null;
    let currentLang = 'zh';

    const I18N = {

        'label.so_path': 'SO absolute path (libil2cpp.so)',
        'label.meta_path': 'Global-Metadata absolute path (global-metadata.dat)',
        'label.output_path': 'Output script path',

        'btn.choose_folder': 'Choose Folder',
        'hint.output_folder': 'After choosing a folder, default filename result.r2 is appended automatically, and can be edited.',
        'section.options': '2. Script Options (R2 Flags & Comments)',
        'btn.run': 'Run Extract & Convert',
        'console.logs': 'Execution Logs',
        'tag.ready': 'Ready',
        'out.ready_convert': 'Ready to convert...',

        'action.input_selected': 'Input file selected',
        'action.pick_file_failed': 'File selection failed',
        'action.output_dir_selected': 'Output directory selected',
        'action.pick_dir_failed': 'Directory selection failed',

        'err.proc_exit_no_file': '[-] Error: process exited but script.json was not generated. Please check logs above.',

    function now() { return new Date().toLocaleTimeString(); }

    function detectInitialLanguage() {
      let hostLang = '';
      try {
        if (window.R2PluginHost && typeof window.R2PluginHost.systemLanguage === 'function') {
          hostLang = window.R2PluginHost.systemLanguage();
        }
      } catch (_) { }

      const tag = String(hostLang || navigator.language || 'en').toLowerCase();
      return tag.startsWith('zh') ? 'zh' : 'en';
    }

    function t(key, vars = {}) {
      const dict = I18N[currentLang] || I18N.zh;
      const fallback = I18N.en;
      const hasPrimary = Object.prototype.hasOwnProperty.call(dict, key);
      const hasFallback = Object.prototype.hasOwnProperty.call(fallback, key);
      const template = hasPrimary ? dict[key] : (hasFallback ? fallback[key] : key);
      return String(template).replace(/\{(\w+)\}/g, (_, name) => {
        return Object.prototype.hasOwnProperty.call(vars, name)
          ? String(vars[name])
          : `{${name}}`;
      });
    }

    function applyI18n() {
      document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
      document.title = t('doc.title');

      document.querySelectorAll('[data-i18n]').forEach((el) => {
        if (el.id === 'lastAction' && el.dataset.pristineAction !== '1') return;
        if (el.id === 'out' && el.dataset.pristine !== '1') return;
        const key = el.getAttribute('data-i18n');
        if (!key) return;
        el.textContent = t(key);
      });

      const langSelect = document.getElementById('langSelect');
      if (langSelect) {
        langSelect.value = currentLang;
      }
    }

    function onLanguageChange(lang) {
      currentLang = String(lang || '').toLowerCase().startsWith('zh') ? 'zh' : 'en';
      applyI18n();
    }

    function normalizePath(path) {
      return String(path || '').replace(/\\/g, '/').replace(/\/+/g, '/').trim();
    }

    function safeSessionIdFromPath(path) {
      const normalized = normalizePath(path);
      const fileName = normalized.split('/').filter(Boolean).pop() || 'result.r2';
      return ('il2cpp-apply-' + fileName.replace(/[^a-zA-Z0-9_\-\.]/g, '_')).slice(0, 64);
    }

    function escapeForDoubleQuotes(str) {
      return String(str || '').replace(/\\/g, '\\\\').replace(/"/g, '\\"');
    }

    function joinPath(dir, name) {
      const base = normalizePath(dir).replace(/\/$/, '');
      const file = String(name || '').trim().replace(/^\/+/, '');
      return base && file ? `${base}/${file}` : (base || file);
    }

    function ensureDefaultOutputPath() {
      const outputEl = document.getElementById('outputPath');
      if (!outputEl.value.trim()) {
        const base = safeCall(() => host().dataDir()) || '';
        outputEl.value = joinPath(base, 'result.r2');
      }
    }

    function pickInputFile(targetInputId) {
      safeCall(() => {
        const picked = host().pickFile(`pick-${targetInputId}-${Date.now()}`);
        if (picked && !String(picked).startsWith('Error:')) {
          document.getElementById(targetInputId).value = normalizePath(picked);
          appendLog(t('log.selected_file', { path: picked }));
          setLastAction(t('action.input_selected'));
        } else {
          appendLog(t('log.pick_file_failed', { reason: picked }));
          setLastAction(t('action.pick_file_failed'));
        }
      });
    }

    function pickOutputDirectory() {
      safeCall(() => {
        const picked = host().pickDirectory(`pick-output-dir-${Date.now()}`);
        if (picked && !String(picked).startsWith('Error:')) {
          const outputEl = document.getElementById('outputPath');
          outputEl.value = joinPath(picked, 'result.r2');
          appendLog(t('log.selected_output_dir', { path: picked }));
          setLastAction(t('action.output_dir_selected'));
        } else {
          appendLog(t('log.pick_dir_failed', { reason: picked }));
          setLastAction(t('action.pick_dir_failed'));
        }
      });
    }

    function setLastAction(text) {
      const el = document.getElementById('lastAction');
      el.dataset.pristineAction = '0';
      el.textContent = `[${now()}] ${text}`;
    }

    function setStatus(running, textKey) {
      const dot = document.getElementById('dot');
      const statusText = document.getElementById('statusText');
      const key = textKey || (running ? 'status.converting' : 'status.ready');
      statusText.setAttribute('data-i18n', key);
      if (running) {
        dot.classList.add('running');
        statusText.textContent = t(key);
        document.getElementById('btnRun').disabled = true;
      } else {
        dot.classList.remove('running');
        statusText.textContent = t(key);
        document.getElementById('btnRun').disabled = false;
      }
    }

    function appendLog(text) {
      const out = document.getElementById('out');
      if (out.dataset.pristine === '1') {
        out.textContent = '';
        out.dataset.pristine = '0';
      }
      out.textContent += text + '\n';
      out.scrollTop = out.scrollHeight;
    }

    function host() {
      if (!window.R2PluginHost) throw new Error(t('err.host_unavailable'));
      return window.R2PluginHost;
    }

    function safeCall(fn) {
      try { return fn(); }
      catch (e) {
        appendLog(t('log.error_prefix', { error: e }));
        setLastAction(t('action.exception'));
        return null;
      }
    }

    // 格式化 R2 兼容的名称
    function sanitize(str) {
      if (!str) return 'unknown';
      return str.replace(/[^a-zA-Z0-9_]/g, '_');
    }

    // JSON 转 R2 脚本逻辑
    function generateR2Script(jsonStr, config) {
      let data;
      try { data = JSON.parse(jsonStr); }
      catch (e) { throw new Error(t('err.parse_script_json', { error: e.message })); }

      let script = ["# Il2Cpp Dumper R2 Script", "e asm.comments=true", ""];

      if (config.ScriptMethod && data.ScriptMethod) {
        script.push("# --- ScriptMethod (Functions) ---");
        data.ScriptMethod.forEach(m => {
          let addr = "0x" + m.Address.toString(16);
          let name = sanitize(m.Name);
          let sig = m.Signature ? m.Signature.replace(/"/g, '\\"') : "Method";
          script.push(`af ${addr}`);
          script.push(`afn ${name} @ ${addr}`);
          script.push(`f sym.method.${name} @ ${addr}`);
          script.push(`CC "${sig}" @ ${addr}`);
        });
        script.push("");
      }

      if (config.ScriptString && data.ScriptString) {
        script.push("# --- ScriptString (Strings) ---");
        data.ScriptString.forEach(s => {
          let addr = "0x" + s.Address.toString(16);
          let val = s.Value ? s.Value.replace(/[^a-zA-Z0-9_ -=+!@#$%^&*()]/g, '_') : "str";
          script.push(`CC "str:${val}" @ ${addr}`);
        });
        script.push("");
      }

      if (config.ScriptMetadata && data.ScriptMetadata) {
        script.push("# --- ScriptMetadata ---");
        data.ScriptMetadata.forEach(m => {
          let addr = "0x" + m.Address.toString(16);
          let name = sanitize(m.Name);
          script.push(`f sym.meta.${name} @ ${addr}`);
        });
        script.push("");
      }

      if (config.ScriptMetadataMethod && data.ScriptMetadataMethod) {
        script.push("# --- ScriptMetadataMethod ---");
        data.ScriptMetadataMethod.forEach(m => {
          if (m.MethodAddress > 0) {
            let methodAddr = "0x" + m.MethodAddress.toString(16);
            let name = sanitize(m.Name);
            script.push(`f sym.meta_func.${name} @ ${methodAddr}`);
          }
        });
        script.push("");
      }

      if (config.Addresses && data.Addresses) {
        script.push("# --- Addresses ---");
        data.Addresses.forEach(a => {
          let addr = "0x" + a.toString(16);
          script.push(`f sym.il2cpp_ptr_${addr} @ ${addr}`);
        });
        script.push("");
      }

      return script.join('\n');
    }

    function startConversion() {
      safeCall(() => {
        const soPath = normalizePath(document.getElementById('soPath').value);
        const metaPath = normalizePath(document.getElementById('metaPath').value);
        let outputPath = normalizePath(document.getElementById('outputPath').value);

        if (!soPath || !metaPath) {
          appendLog(t('err.input_required'));
          return;
        }

        if (!outputPath) {
          ensureDefaultOutputPath();
          outputPath = normalizePath(document.getElementById('outputPath').value);
        }

        if (!outputPath) {
          appendLog(t('err.output_invalid'));
          return;
        }

        const config = {
          ScriptMethod: document.getElementById('chk_ScriptMethod').checked,
          ScriptString: document.getElementById('chk_ScriptString').checked,
          ScriptMetadata: document.getElementById('chk_ScriptMetadata').checked,
          ScriptMetadataMethod: document.getElementById('chk_ScriptMetadataMethod').checked,
          Addresses: document.getElementById('chk_Addresses').checked
        };

        // 清空旧日志
        const out = document.getElementById('out');
        out.textContent = '';
        out.dataset.pristine = '0';
        appendLog(t('log.start'));
        setStatus(true, 'status.preparing');

        // 关键修复：直接动态生成一个 Shell 脚本文件，完全避开 ProcessBuilder 的引号解析问题
        const shScriptCode = `#!/system/bin/sh
# 切换到执行目录 (procStart 默认在插件根目录，我们需要进 data)
cd ./data || { echo "[-] 无法进入 data 目录"; exit 1; }

echo "[*] 清理历史文件..."
rm -f script.json
mkdir -p result

echo "[*] 正在复制目标文件..."
cp "$1" ./libil2cpp.so || { echo "[-] 复制 libil2cpp.so 失败"; exit 1; }
cp "$2" ./global-metadata.dat || { echo "[-] 复制 global-metadata.dat 失败"; exit 1; }

echo "[*] 赋予执行权限..."
chmod +x ./Il2CppDumper

echo "[*] 正在启动 Il2CppDumper (这可能需要几秒钟)..."
./Il2CppDumper ./libil2cpp.so ./global-metadata.dat .
echo "[*] Dumper 进程结束, 退出码: $?"
`;

        // 将脚本写入到 data/run_dumper.sh (host().writeData 默认以 data/ 为根目录)
        host().writeData('run_dumper.sh', shScriptCode);

        // 确保先停止之前的遗留进程
        host().procStop(SESSION_ID);

        // 执行这个脚本，通过双引号传递路径参数，ProcessBuilder 能完美处理这种结构
        const execCmd = `sh ./data/run_dumper.sh "${escapeForDoubleQuotes(soPath)}" "${escapeForDoubleQuotes(metaPath)}"`;
        appendLog(t('log.exec_start', { cmd: execCmd }));

        host().procStart(SESSION_ID, execCmd);

        setLastAction(t('action.wait_dumper'));
        setStatus(true, 'status.dumper_running');

        let attempts = 0;
        const maxAttempts = 60; // 60秒超时

        if (checkInterval) clearInterval(checkInterval);

        checkInterval = setInterval(() => {
          safeCall(() => {
            attempts++;

            // 实时读取终端输出
            const dumperLog = host().procRead(SESSION_ID, 100, 200);
            if (dumperLog && dumperLog.trim() !== '') {
              appendLog(dumperLog);
            }

            // 尝试读取生成的 script.json
            let jsonContent = null;
            try {
              jsonContent = host().readText('data/script.json');
            } catch (e) { /* 文件尚未生成 */ }

            // 检查底层进程是否已死
            const isAliveStr = host().procAlive(SESSION_ID);
            const isAlive = String(isAliveStr).trim() === 'true';

            if (jsonContent && jsonContent.length > 50) {
              clearInterval(checkInterval);
              appendLog(t('log.detected_script_json'));
              setStatus(true, 'status.parsing');

              host().procStop(SESSION_ID);

              try {
                const r2Script = generateR2Script(jsonContent, config);

                // 输出到用户指定路径（先写到插件 data，再复制到目标绝对路径）
                const rawOutputName = normalizePath(outputPath).split('/').filter(Boolean).pop() || 'result.r2';
                const outputFileName = rawOutputName.replace(/[\/\\]/g, '') || 'result.r2';
                host().writeData(outputFileName, r2Script);

                const writeScriptCode = `#!/system/bin/sh
TARGET_PATH="$1"
SOURCE_NAME="$2"
mkdir -p "$(dirname "$TARGET_PATH")" || exit 1
cp "./data/$SOURCE_NAME" "$TARGET_PATH" || exit 1
echo "ok"
`;
                host().writeData('write_output.sh', writeScriptCode);
                const writeSessionId = safeSessionIdFromPath(outputPath);
                host().procStop(writeSessionId);
                const writeCmd = `sh ./data/write_output.sh "${escapeForDoubleQuotes(outputPath)}" "${escapeForDoubleQuotes(outputFileName)}"`;
                host().procStart(writeSessionId, writeCmd);
                const writeLog = host().procRead(writeSessionId, 1500, 200);
                host().procStop(writeSessionId);

                const writeLogText = String(writeLog || '').toLowerCase();
                const copyMaybeFailed = writeLogText.includes('error') || writeLogText.includes('exit') || !writeLogText.includes('ok');
                if (copyMaybeFailed) {
                  appendLog(t('warn.copy_maybe_failed'));
                  appendLog(writeLog || '(empty)');
                }

                // 自动在当前项目执行脚本（复制失败时回退到插件 data 目录脚本）
                const pluginDataOutputPath = joinPath(host().dataDir(), outputFileName);
                const scriptPathForRun = copyMaybeFailed ? pluginDataOutputPath : outputPath;
                if (copyMaybeFailed) {
                  appendLog(t('warn.fallback_run_path', { path: scriptPathForRun }));
                }

                const runCmd = `. "${escapeForDoubleQuotes(scriptPathForRun)}" ; iIj`;
                const runResult = host().r2(runCmd);

                appendLog(`\n[===================================]`);
                appendLog(t('log.done'));
                appendLog(t('log.target_output_path', { path: outputPath }));
                appendLog(t('log.actual_exec_path', { path: scriptPathForRun }));
                appendLog(t('log.auto_exec', { path: scriptPathForRun }));
                appendLog(t('log.r2_echo', { output: runResult }));
                appendLog(`[===================================]`);

                setStatus(false, 'status.success_exec');
                setLastAction(t('action.done'));

              } catch (e) {
                appendLog(t('err.convert_failed', { error: e.message }));
                setStatus(false, 'status.failed');
                setLastAction(t('action.exception'));
              }
            } else if (!isAlive && attempts > 3) {
              // 进程死掉且没出文件
              clearInterval(checkInterval);
              appendLog(t('err.proc_exit_no_file'));
              setStatus(false, 'status.exec_failed');
              setLastAction(t('action.exec_error'));
            } else if (attempts >= maxAttempts) {
              // 超时
              clearInterval(checkInterval);
              appendLog(t('err.timeout'));
              host().procStop(SESSION_ID);
              setStatus(false, 'status.timeout_failed');
              setLastAction(t('action.timeout'));
            }
          });
        }, 1000);

      });
    }

    // 初始化默认语言与默认输出路径
    currentLang = detectInitialLanguage();
    applyI18n();
    ensureDefaultOutputPath();
  </script>

</body>

</html>
