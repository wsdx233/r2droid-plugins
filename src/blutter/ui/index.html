<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Blutter</title><link rel="stylesheet" href="blutter.css"/></head><body>
<div class="toolbar"><h1 data-i18n="title">Blutter</h1><div id="status" class="status">Idle</div></div>
<div class="card"><p data-i18n="hint"></p><div class="row"><button onclick="pickApk()" data-i18n="chooseApk">Choose APK</button><button onclick="pickOutputDir()" data-i18n="chooseOut">Choose Output Dir</button><button onclick="pickResultDir()" data-i18n="pickResult">Choose Existing Result</button><button onclick="setupEnvironment()" data-i18n="setup">Setup / Repair</button></div><div id="apkPath" class="path">APK: -</div><div id="outPath" class="path">Output: -</div></div>
<div class="card"><div class="row"><button class="primary" onclick="runBlutter()" data-i18n="run">Run Blutter</button><button onclick="stopRun()" data-i18n="stop">Stop</button><button onclick="openOutput()" data-i18n="openOut">Open Output</button></div></div>
<div class="card"><div class="row"><button onclick="generateR2()" data-i18n="gen">Generate r2 script</button><button class="primary" onclick="applyR2()" data-i18n="apply">Execute in current project</button><button onclick="previewR2()" data-i18n="preview">Preview</button></div><div id="r2Path" class="path">r2: -</div></div>
<div class="row"><button onclick="clearLog()" data-i18n="clear">Clear Log</button></div><pre id="log"></pre><script src="blutter.js"></script></body></html>
